version: '3.9'

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: chainbreaker-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/chainbreaker
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - ./neo4j_setup/cypher:/cypher
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p chainbreaker 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: chainbreaker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chainbreaker-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: chainbreaker-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=chainbreaker
      - NEO4J_DATABASE=neo4j
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ../config:/app/config
      - ../models:/app/models
      - ../data:/app/data
      - ../logs:/app/logs

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: chainbreaker-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  neo4j_data:
