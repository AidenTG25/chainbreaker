# CICFlowMeter Feature Columns (80 features)
# Source: CICIDS2017/CICFlowMeter format
feature_columns:
  - Flow.ID
  - Src.IP
  - Src.Port
  - Dst.IP
  - Dst.Port
  - Protocol
  - Timestamp
  - Flow.Duration
  - Total.Fwd.Packets
  - Total.Backward.Packets
  - Total.Length.of.Fwd.Packets
  - Total.Length.of.Bwd.Packets
  - Fwd.Packet.Length.Max
  - Fwd.Packet.Length.Min
  - Fwd.Packet.Length.Mean
  - Fwd.Packet.Length.Std
  - Bwd.Packet.Length.Max
  - Bwd.Packet.Length.Min
  - Bwd.Packet.Length.Mean
  - Bwd.Packet.Length.Std
  - Flow.Bytes.s
  - Flow.Packets.s
  - Flow.IAT.Mean
  - Flow.IAT.Std
  - Flow.IAT.Max
  - Flow.IAT.Min
  - Fwd.IAT.Total
  - Fwd.IAT.Mean
  - Fwd.IAT.Std
  - Fwd.IAT.Max
  - Fwd.IAT.Min
  - Bwd.IAT.Total
  - Bwd.IAT.Mean
  - Bwd.IAT.Std
  - Bwd.IAT.Max
  - Bwd.IAT.Min
  - Fwd.PSH.Flags
  - Bwd.PSH.Flags
  - Fwd.URG.Flags
  - Bwd.URG.Flags
  - Fwd.Header.Length
  - Bwd.Header.Length
  - Fwd.Packets.s
  - Bwd.Packets.s
  - Min.Packet.Length
  - Max.Packet.Length
  - Packet.Length.Mean
  - Packet.Length.Std
  - Packet.Length.Variance
  - SYN.Flag.Count
  - RST.Flag.Count
  - ACK.Flag.Count
  - URG.Flag.Count
  - CWE.Flag.Count
  - ECE.Flag.Count
  - Down.Up.Ratio
  - Average.Packet.Size
  - Avg.Fwd.Segment.Size
  - Avg.Bwd.Segment.Size
  - Fwd.Avg.Bytes.Bulk
  - Fwd.Avg.Packets.Bulk
  - Fwd.Avg.Bulk.Rate
  - Bwd.Avg.Bytes.Bulk
  - Bwd.Avg.Packets.Bulk
  - Bwd.Avg.Bulk.Rate
  - Subflow.Fwd.Packets
  - Subflow.Fwd.Bytes
  - Subflow.Bwd.Packets
  - Subflow.Bwd.Bytes
  - Init_Win.bytes.forward
  - Init_Win.bytes.backward
  - act_data_pkt_fwd
  - min_seg_size_forward
  - Active.Mean
  - Active.Std
  - Active.Max
  - Active.Min
  - Idle.Mean
  - Idle.Std
  - Idle.Max
  - Idle.Min

# Derived features (computed during extraction)
derived_features:
  - bytes_per_packet
  - packets_per_second
  - fwd_bwd_ratio
  - syn_ratio
  - ack_ratio
  - packet_size_variance_ratio
  - iat_cv  # coefficient of variation

# Model paths (relative to models/ directory)
model_paths:
  random_forest: "rf_kill_chain.pkl"
  xgboost: "xgb_kill_chain.json"
  isolation_forest: "if_kill_chain.pkl"
  ensemble: "ensemble.pkl"

# Detection Thresholds
detection:
  rf_confidence_threshold: 0.7
  xgb_confidence_threshold: 0.7
  if_contamination: 0.01
  if_score_threshold: 0.15
  ensemble_vote_threshold: 0.65

# Class Labels (8 kill chain stages + benign)
class_labels:
  0: "BENIGN"
  1: "Initial_Access"
  2: "Persistence"
  3: "Command_and_Control"
  4: "Discovery"
  5: "Credential_Access"
  6: "Lateral_Movement"
  7: "Defense_Evasion"
  8: "Exfiltration"

# Training
training:
  test_split: 0.2
  validation_split: 0.15
  random_state: 42
  cross_validation_folds: 5
  class_weight: "balanced"

# Random Forest
random_forest:
  n_estimators: 200
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  bootstrap: true
  n_jobs: -1

# XGBoost
xgboost:
  n_estimators: 200
  max_depth: 8
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  objective: "multi:softprob"
  eval_metric: "mlogloss"
  n_jobs: -1

# Isolation Forest
isolation_forest:
  n_estimators: 200
  max_samples: "auto"
  contamination: 0.01
  max_features: 1.0
  bootstrap: false
  n_jobs: -1
